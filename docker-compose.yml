services:
  postgres:
    image: postgres:18
    container_name: vlm-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}             
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}      
      POSTGRES_DB: ${DATABASE_NAME}                
    ports:
      - "${DATABASE_PORT}:5432"                    
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - vlm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  vlm-network:
    driver: bridge